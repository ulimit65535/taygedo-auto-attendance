name: 塔吉多签到

on:
  workflow_dispatch:
  schedule:
    - cron: '39 1 * * *'

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 运行签到
        env:
          TAYGEDO_ACCOUNTS: ${{ secrets.TAYGEDO_ACCOUNTS }}
          TAYGEDO_NOTIFICATION_URLS: ${{ secrets.TAYGEDO_NOTIFICATION_URLS }}
          TAYGEDO_MAX_RETRIES: ${{ secrets.TAYGEDO_MAX_RETRIES }}
          TAYGEDO_UPDATED_ACCOUNTS_PATH: updated-accounts.json
        run: pnpm action

      - name: 更新账号 Secret
        if: hashFiles('updated-accounts.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GH_SECRET_UPDATE_TOKEN }}
        run: gh secret set TAYGEDO_ACCOUNTS < updated-accounts.json
